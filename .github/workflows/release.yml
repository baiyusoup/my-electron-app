name: Build and Release Electron App

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      release_tag: ${{ steps.version.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute release version
        id: version
        shell: bash
        run: |
          BASE_VERSION=$(node -p "const v=require('./package.json').version.split('.'); `${v[0]}.${v[1]}`")
          APP_VERSION="${BASE_VERSION}.${GITHUB_RUN_NUMBER}"
          RELEASE_TAG="v${APP_VERSION}"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            make_script: make:win
            artifact_name: windows-make
          - os: macos-latest
            make_script: make:mac
            artifact_name: macos-make

    runs-on: ${{ matrix.os }}

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set app version for this build
        shell: bash
        run: |
          node -e "const fs=require('fs'); const p='./package.json'; const pkg=require(p); pkg.version='${{ needs.prepare.outputs.app_version }}'; fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');"

      - name: Build distributables
        run: npm run ${{ matrix.make_script }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: out/make

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Show collected files
        run: find dist -type f | sort

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: Release ${{ needs.prepare.outputs.release_tag }}
          files: |
            dist/**/*.exe
            dist/**/*.nupkg
            dist/**/RELEASES
            dist/**/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
